name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required frontend env
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_BIENVENIDA_URL: ${{ secrets.VITE_BIENVENIDA_URL }}
          VITE_ORACULO_URL: ${{ secrets.VITE_ORACULO_URL }}
        run: |
          missing=0
          for key in VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY VITE_API_URL; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing GitHub secret: ${key}"
              missing=1
            fi
          done
          if [ -z "$VITE_BIENVENIDA_URL" ] && [ -z "$VITE_ORACULO_URL" ]; then
            echo "::error::Missing GitHub secret: set VITE_BIENVENIDA_URL or VITE_ORACULO_URL"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Build project
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_AUTH_REDIRECT_TO: ${{ secrets.VITE_SUPABASE_AUTH_REDIRECT_TO }}
          VITE_SUPABASE_FUNCTIONS_URL: ${{ secrets.VITE_SUPABASE_FUNCTIONS_URL }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_OBRA_API_URL: ${{ secrets.VITE_OBRA_API_URL }}
          VITE_OBRA_USE_CONCIENCIA: ${{ secrets.VITE_OBRA_USE_CONCIENCIA }}
          VITE_OBRA_FORCE_CONCIENCIA: ${{ secrets.VITE_OBRA_FORCE_CONCIENCIA }}
          VITE_BIENVENIDA_URL: ${{ secrets.VITE_BIENVENIDA_URL }}
          VITE_ORACULO_URL: ${{ secrets.VITE_ORACULO_URL }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_STRIPE_SUBSCRIPTION_PRICE_ID: ${{ secrets.VITE_STRIPE_SUBSCRIPTION_PRICE_ID }}
          VITE_PRICE_TAZA: ${{ secrets.VITE_PRICE_TAZA }}
          VITE_PRICE_NOVELA: ${{ secrets.VITE_PRICE_NOVELA }}
          VITE_PRICE_COMBO: ${{ secrets.VITE_PRICE_COMBO }}
          VITE_INSTAGRAM_BUCKET: ${{ secrets.VITE_INSTAGRAM_BUCKET }}
          VITE_INSTAGRAM_TABLE: ${{ secrets.VITE_INSTAGRAM_TABLE }}
          VITE_SEARCH_API_URL: ${{ secrets.VITE_SEARCH_API_URL }}
          VITE_MINIVERSO_INTERCEPTION: ${{ secrets.VITE_MINIVERSO_INTERCEPTION }}
          VITE_AUTOFICCION_URL: ${{ secrets.VITE_AUTOFICCION_URL }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
        run: npm run build

      - name: Show contents of dist/
        run: ls -la dist/

      - name: Validate deploy env
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.SSH_HOST || secrets.FTP_SERVER }}
          DEPLOY_USER: ${{ secrets.SSH_USERNAME || secrets.FTP_USERNAME }}
          DEPLOY_PORT: ${{ secrets.SSH_PORT || '65002' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || 'domains/esungatoencerrado.com/public_html/' }}
        run: |
          missing=0
          for key in SSH_PRIVATE_KEY DEPLOY_HOST DEPLOY_USER DEPLOY_PORT DEPLOY_PATH; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing GitHub secret/env value: ${key}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.SSH_HOST || secrets.FTP_SERVER }}
          DEPLOY_USER: ${{ secrets.SSH_USERNAME || secrets.FTP_USERNAME }}
          DEPLOY_PORT: ${{ secrets.SSH_PORT || '65002' }}
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          cat > "$HOME/.ssh/config" <<EOF
          Host deploy-target
            HostName ${DEPLOY_HOST}
            User ${DEPLOY_USER}
            Port ${DEPLOY_PORT}
            IdentityFile ${HOME}/.ssh/id_ed25519
            IdentitiesOnly yes
            AddressFamily inet
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ServerAliveInterval 30
            ServerAliveCountMax 3
          EOF
          chmod 600 "$HOME/.ssh/config"

      - name: Check SSH connectivity
        run: |
          ssh -4 -F "$HOME/.ssh/config" -o BatchMode=yes -o ConnectTimeout=20 deploy-target "printf 'ssh ok\n'"

      - name: Deploy via rsync
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || 'domains/esungatoencerrado.com/public_html/' }}
        run: |
          rsync -avzr --delete \
            -e "ssh -4 -F $HOME/.ssh/config" \
            dist/ \
            "deploy-target:${DEPLOY_PATH}"
