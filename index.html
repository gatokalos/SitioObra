		<style>
			@font-face {
				font-family: "Vox Round";
				src: url("/fonts/vox-round/VoxRound-Semibold.woff2") format("woff2");
				font-weight: 600;
				font-style: normal;
				font-display: swap;
			}

			html,
			body {
				height: 100%;
				margin: 0;
				background-color: #050507;
			}

			#root {
				min-height: 100%;
				background-color: #050507;
			}

			#app-splash {
				position: fixed;
				inset: 0;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				background-color: #050507;
				background-image: radial-gradient(circle at top, rgba(76, 29, 149, 0.28), rgba(8, 8, 12, 0.95));
				color: #e2e8f0;
				font-family: "Georgia", "Times New Roman", serif;
				letter-spacing: 0.06em;
				z-index: 9999;
				transition: opacity 300ms ease;
			}

			#app-splash.hidden {
				opacity: 0;
				pointer-events: none;
			}

			#app-splash p {
				font-size: 0.9rem;
				text-transform: uppercase;
				color: rgba(226, 232, 240, 0.7);
			}

			/* Hero title visible desde el primer paint, antes de que React monte */
			.splash-hero-title-wrap {
				position: absolute;
				top: 50%;
				left: 0;
				right: 0;
				transform: translateY(-50%);
				text-align: center;
				padding: 0 clamp(1rem, 5vw, 3rem);
				pointer-events: none;
			}

			.splash-hero-title {
				margin: 0;
				font-family: "Vox Round", Georgia, "Times New Roman", serif;
				font-weight: 600;
				letter-spacing: 0.25em;
				text-transform: uppercase;
				line-height: 1.05;
				background: linear-gradient(180deg, rgba(255, 255, 255, 0.36) 0%, rgba(32, 34, 40, 0.9) 34%, #020204 100%);
				-webkit-background-clip: text;
				background-clip: text;
				-webkit-text-fill-color: rgba(0, 0, 0, 0.76);
				color: rgba(0, 0, 0, 0.76);
				-webkit-text-stroke: 0.35px rgba(226, 232, 240, 0.13);
				text-shadow:
					0 0 1px rgba(255, 255, 255, 0.24),
					0 0 14px rgba(226, 232, 240, 0.16),
					0 0 24px rgba(88, 72, 126, 0.18);
			}

			.splash-hero-mark {
				display: block;
				margin: 0 auto clamp(0.35rem, 1.6vh, 0.8rem);
				font-size: clamp(4.5rem, 12vh, 7.8rem);
				letter-spacing: 0;
				line-height: 0.9;
			}

			.splash-hero-word {
				display: block;
				font-size: clamp(2rem, 7.5vw, 5rem);
			}

			@media (max-width: 480px) {
				.splash-hero-word {
					font-size: clamp(1.6rem, 8vw, 2.2rem);
					letter-spacing: 0.12em;
				}
			}

			@media (min-width: 769px) {
				.splash-hero-word {
					font-size: clamp(3rem, 4vw, 5rem);
					letter-spacing: 0.22em;
				}
			}

			@media (min-width: 1201px) {
				.splash-hero-word {
					font-size: clamp(4rem, 3.5vw, 5rem);
					letter-spacing: 0.25em;
				}
			}
		</style>
	</head>

	<body>
		<div id="app-splash">
			<div class="splash-hero-title-wrap" aria-hidden="true">
				<h1 class="splash-hero-title">
					<span class="splash-hero-mark">#</span>
					<span class="splash-hero-word">GATOENCERRADO</span>
				</h1>
			</div>
		</div>
		<div id="root"></div>
		<script>
			(() => {
				const splash = document.getElementById('app-splash');
				const root = document.getElementById('root');
				if (!splash || !root) return;
				const hideSplash = () => {
					splash.classList.add('hidden');
					setTimeout(() => splash.remove(), 350);
				};
				const observer = new MutationObserver(() => {
					if (root.childNodes.length > 0) {
						hideSplash();
						observer.disconnect();
					}
				});
				observer.observe(root, { childList: true });
				window.addEventListener('load', hideSplash, { once: true });
			})();
		</script>
	<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
