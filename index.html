<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<title>#GatoEncerrado — Universo transmedia</title>


		<!-- FAVICON -->
			<link rel="icon" type="image/png" href="/assets/favicon-64.png" />

		<!-- PRELOADS críticos -->
		<link rel="preload" href="/fonts/vox-round/VoxRound-Semibold.woff2" as="font" type="font/woff2" crossorigin />

		<!-- PRECONNECT para CDN de three.js -->
		<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
		<link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />

		<!-- OPEN GRAPH -->
		<meta property="og:title" content="#GatoEncerrado — Universo transmedia" />
		<meta property="og:description" content="Explora los miniversos: Cine, Novela, RA, Juegos, Bitácora y más." />
		<meta property="og:image" content="https://gatoencerrado.ai/assets/social-card.jpg" />
		<meta property="og:url" content="https://gatoencerrado.ai" />
		<meta property="og:type" content="website" />

		<!-- TWITTER -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="#GatoEncerrado — Universo transmedia" />
		<meta name="twitter:description" content="Explora miniversos, mundos y experiencias del universo #GatoEncerrado." />
		<meta name="twitter:image" content="https://gatoencerrado.ai/assets/social-card.jpg" />

		<script async src="https://ga.jspm.io/npm:es-module-shims@1.7.3/dist/es-module-shims.js"></script>

		<script type="importmap-shim">
			{
				"imports": {
					"three": "https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.module.js",
					"three/addons/renderers/CSS3DRenderer.js": "https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/renderers/CSS3DRenderer.js"
				}
			}
		</script>

		<script type="importmap">
			{
				"imports": {
					"three": "https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.module.js",
					"three/addons/renderers/CSS3DRenderer.js": "https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/renderers/CSS3DRenderer.js"
				}
			}
		</script>
		<style>
			@font-face {
				font-family: "Vox Round";
				src: url("/fonts/vox-round/VoxRound-Semibold.woff2") format("woff2");
				font-weight: 600;
				font-style: normal;
				font-display: swap;
			}

			html,
			body {
				height: 100%;
				margin: 0;
				background-color: #050507;
			}

			#root {
				min-height: 100%;
				background-color: #050507;
			}

			#app-splash {
				position: fixed;
				inset: 0;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 16px;
				background-color: #050507;
				background-image: radial-gradient(circle at top, rgba(76, 29, 149, 0.28), rgba(8, 8, 12, 0.95));
				color: #e2e8f0;
				font-family: "Georgia", "Times New Roman", serif;
				letter-spacing: 0.06em;
				z-index: 9999;
				transition: opacity 300ms ease;
			}

			#app-splash.hidden {
				opacity: 0;
				pointer-events: none;
			}

			#app-splash p {
				font-size: 0.9rem;
				text-transform: uppercase;
				color: rgba(226, 232, 240, 0.7);
			}

			.splash-spinner-wrap {
				transform: translateY(-12vh);
			}

			.splash-spinner {
				width: 84px;
				height: 84px;
				border-radius: 9999px;
				border: 2px solid rgba(255, 255, 255, 0.12);
				border-top-color: rgba(192, 132, 252, 0.8);
				border-right-color: rgba(248, 113, 113, 0.6);
				box-shadow: 0 0 28px rgba(168, 85, 247, 0.35);
				animation: splash-spin 1.6s linear infinite;
			}

			@keyframes splash-spin {
				to {
					transform: rotate(360deg);
				}
			}

			/* Hero title visible desde el primer paint, antes de que React monte */
			.splash-hero-title-wrap {
				position: absolute;
				top: 50%;
				left: 0;
				right: 0;
				transform: translateY(-50%);
				text-align: center;
				padding: 0 clamp(1rem, 5vw, 3rem);
				pointer-events: none;
			}

			.splash-hero-title {
				margin: 0;
				font-family: "Vox Round", Georgia, "Times New Roman", serif;
				font-weight: 600;
				font-size: clamp(2rem, 7.5vw, 5rem);
				letter-spacing: 0.25em;
				text-transform: uppercase;
				line-height: 1.05;
				background: linear-gradient(125deg, #2d2d2d, #bdbdbd, #ffffff);
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
				background-clip: text;
			}

			@media (max-width: 480px) {
				.splash-hero-title {
					font-size: clamp(1.6rem, 8vw, 2.2rem);
					letter-spacing: 0.12em;
				}
			}

			@media (min-width: 769px) {
				.splash-hero-title {
					font-size: clamp(3rem, 4vw, 5rem);
					letter-spacing: 0.22em;
				}
			}

			@media (min-width: 1201px) {
				.splash-hero-title {
					font-size: clamp(4rem, 3.5vw, 5rem);
					letter-spacing: 0.25em;
				}
			}
		</style>
	</head>

	<body>
		<div id="app-splash">
			<div class="splash-hero-title-wrap" aria-hidden="true">
				<h1 class="splash-hero-title">#GATOENCERRADO</h1>
			</div>
			<div class="splash-spinner-wrap">
				<div class="splash-spinner" aria-hidden="true"></div>
			</div>
		</div>
		<div id="root"></div>
		<script>
			(() => {
				const splash = document.getElementById('app-splash');
				const root = document.getElementById('root');
				if (!splash || !root) return;
				const hideSplash = () => {
					splash.classList.add('hidden');
					setTimeout(() => splash.remove(), 350);
				};
				const observer = new MutationObserver(() => {
					if (root.childNodes.length > 0) {
						hideSplash();
						observer.disconnect();
					}
				});
				observer.observe(root, { childList: true });
				window.addEventListener('load', hideSplash, { once: true });
			})();
		</script>
	<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
