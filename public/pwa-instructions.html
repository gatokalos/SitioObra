<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Descarga #GatoEncerrado</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html, body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, 'Inter', sans-serif;
        background: #050507;
        color: #e2e8f0;
      }
      .stage {
        position: relative;
        min-height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
      }
      .stars {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .star {
        position: absolute;
        width: 2px;
        height: 2px;
        border-radius: 50%;
        background: rgba(226, 232, 240, 0.85);
        animation: twinkle 4.5s ease-in-out infinite;
      }
      @keyframes twinkle {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 0.9; }
      }
      .page {
        position: relative;
        z-index: 1;
        max-width: 320px;
        margin: 0 auto;
        padding: 14px 20px 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .steps {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
      }
      .step {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 5px;
      }
      .step-icon {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        border: 1.25px solid rgba(226, 232, 240, 0.65);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #e2e8f0;
        flex-shrink: 0;
      }
      .step-icon svg {
        width: 17px;
        height: 17px;
      }
      .step-icon img {
        width: 100%;
        height: 100%;
        border-radius: 9px;
        object-fit: cover;
      }
      .step p {
        margin: 0;
        font-size: 0.78rem;
        line-height: 1.25;
        color: #e2e8f0;
      }
      .arrow {
        color: rgba(226, 232, 240, 0.45);
        margin: 3px 0;
      }
      .arrow svg {
        width: 11px;
        height: 12px;
      }
      [data-steps] {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="stars" id="stars"></div>
      <div class="page">
        <div class="steps" data-steps="ios">
          <div class="step">
            <div class="step-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 15V4" />
                <path d="M8 8l4-4 4 4" />
                <path d="M5 13v6a2 2 0 002 2h10a2 2 0 002-2v-6" />
              </svg>
            </div>
            <p>1. Toca el botón Compartir</p>
          </div>
          <div class="arrow">
            <svg viewBox="0 0 11 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5.5 1v7.5M2 6l3.5 4 3.5-4" />
            </svg>
          </div>
          <div class="step">
            <div class="step-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="5" />
                <path d="M12 8v8M8 12h8" />
              </svg>
            </div>
            <p>2. Selecciona "Añadir a pantalla de inicio"</p>
          </div>
          <div class="arrow">
            <svg viewBox="0 0 11 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5.5 1v7.5M2 6l3.5 4 3.5-4" />
            </svg>
          </div>
          <div class="step">
            <div class="step-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="5" />
                <path d="M8 12.5l2.5 2.5L16 9.5" />
              </svg>
            </div>
            <p>3. Toca "Añadir"</p>
          </div>
          <div class="arrow">
            <svg viewBox="0 0 11 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5.5 1v7.5M2 6l3.5 4 3.5-4" />
            </svg>
          </div>
          <div class="step">
            <div class="step-icon">
              <img src="/assets/icon-180.png" alt="Ícono de #GatoEncerrado" />
            </div>
            <p>4. Listo, en tu pantalla de inicio</p>
          </div>
        </div>

        <div class="steps" data-steps="android">
          <div class="step">
            <div class="step-icon">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <circle cx="12" cy="5" r="1.7" />
                <circle cx="12" cy="12" r="1.7" />
                <circle cx="12" cy="19" r="1.7" />
              </svg>
            </div>
            <p>1. Toca el menú ⋮ de Chrome</p>
          </div>
          <div class="arrow">
            <svg viewBox="0 0 11 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5.5 1v7.5M2 6l3.5 4 3.5-4" />
            </svg>
          </div>
          <div class="step">
            <div class="step-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 4v10" />
                <path d="M8 10l4 4 4-4" />
                <path d="M5 18h14" />
              </svg>
            </div>
            <p>2. "Instalar app" o "Agregar a inicio"</p>
          </div>
          <div class="arrow">
            <svg viewBox="0 0 11 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5.5 1v7.5M2 6l3.5 4 3.5-4" />
            </svg>
          </div>
          <div class="step">
            <div class="step-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="5" />
                <path d="M8 12.5l2.5 2.5L16 9.5" />
              </svg>
            </div>
            <p>3. Confirma en el diálogo</p>
          </div>
          <div class="arrow">
            <svg viewBox="0 0 11 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5.5 1v7.5M2 6l3.5 4 3.5-4" />
            </svg>
          </div>
          <div class="step">
            <div class="step-icon">
              <img src="/assets/icon-180.png" alt="Ícono de #GatoEncerrado" />
            </div>
            <p>4. Listo, en tu pantalla de inicio</p>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        var starsContainer = document.getElementById('stars');
        var STAR_COUNT = 18;
        for (var i = 0; i < STAR_COUNT; i++) {
          var star = document.createElement('div');
          star.className = 'star';
          star.style.top = (Math.random() * 100) + '%';
          star.style.left = (Math.random() * 100) + '%';
          star.style.animationDelay = (Math.random() * 4.5) + 's';
          starsContainer.appendChild(star);
        }

        var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
        var target = isIOS ? 'ios' : 'android';
        var block = document.querySelector('[data-steps="' + target + '"]');
        if (block) block.style.display = 'flex';
      })();
    </script>
  </body>
</html>
